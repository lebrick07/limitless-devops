# Local testing overrides — use with:
#   helm install phoenix-demo ./helm -f helm/values-local.yaml \
#     --set secretEnv.DATABASE_URL="..." \
#     --set secretEnv.SECRET_KEY_BASE="$(mix phx.gen.secret)"
#
# Prerequisites:
#   1. Docker Desktop with Kubernetes enabled
#   2. kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#   3. docker build -t phoenix-demo:local .   (run from phoenix_live_view_example/)
#   4. Access the app at http://localhost after helm install

replicaCount: 1   # single replica is enough for local testing

image:
  repository: phoenix-demo
  tag: local
  pullPolicy: Never   # use the locally built image, don't try to pull from a registry

env:
  PHX_HOST: localhost
  PORT: "4000"
  POOL_SIZE: "2"
  DATABASE_SSL: "false"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"   # no TLS locally
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []   # no TLS for local testing

# Disable HPA — not useful with a single replica locally
autoscaling:
  enabled: false

# Relax PDB for single replica
podDisruptionBudget:
  enabled: false

# No Karpenter taint locally — Docker Desktop has no workload-tainted nodes
tolerations: []
