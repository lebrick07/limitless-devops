{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "phoenix-liveview-demo.serviceAccountName" . }}
  labels:
    {{- include "phoenix-liveview-demo.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
# The application does not call the Kubernetes API, so we disable token
# automounting entirely. If libcluster is added for Erlang distribution
# (required for multi-replica Presence), the dns strategy does not need
# a token; the kubernetes strategy does — re-enable and add the Role below.
{{- end }}

# ── RBAC for libcluster kubernetes strategy (disabled unless needed) ──────────
