apiVersion: v1
kind: Secret
metadata:
  name: {{ include "phoenix-liveview-demo.fullname" . }}-secrets
  labels:
    {{- include "phoenix-liveview-demo.labels" . | nindent 4 }}
  annotations:
    # In production, manage this Secret via external-secrets-operator pulling
    # from AWS Secrets Manager (GovCloud endpoint: secretsmanager.us-gov-west-1.amazonaws.com).
    # The values below are placeholders — never commit real secrets to git.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-1"
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secretEnv.DATABASE_URL | quote }}
  SECRET_KEY_BASE: {{ .Values.secretEnv.SECRET_KEY_BASE | quote }}
