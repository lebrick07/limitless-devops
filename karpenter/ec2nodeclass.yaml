apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: phoenix-liveview
spec:
  # ── AMI ────────────────────────────────────────────────────────────────────
  # AL2 is the standard EKS-optimised AMI family. Karpenter resolves the
  # latest version for the cluster's k8s version automatically via SSM.
  # In GovCloud (us-gov-west-1), use the AL2 FIPS variant if the cluster
  # security baseline requires FIPS 140-2 validated crypto modules.
  amiFamily: AL2
  amiSelectorTerms:
    - alias: al2@latest

  # ── Networking ─────────────────────────────────────────────────────────────
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dev-app-api-cl01"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dev-app-api-cl01"

  # ── IAM ────────────────────────────────────────────────────────────────────
  # Node IAM role must exist before Karpenter can launch instances.
  role: KarpenterNodeRole-dev-app-api-cl01

  # ── Instance metadata (IMDSv2) ─────────────────────────────────────────────
  # IMDSv2 enforced — hop limit of 1 prevents containers from reaching the
  # metadata service directly (best practice; required in GovCloud/FedRAMP).
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1        # container isolation
    httpTokens: required              # IMDSv2 only — no IMDSv1 fallback

  # ── Storage ────────────────────────────────────────────────────────────────
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        # kmsKeyID: arn:aws:kms:us-east-1:ACCOUNT:key/KEY-ID
        # Uncomment and set the CMK ARN for customer-managed key encryption.
        # In GovCloud: arn:aws-us-gov:kms:us-gov-west-1:ACCOUNT:key/KEY-ID
        deleteOnTermination: true

  # ── User data ──────────────────────────────────────────────────────────────
  # No custom user data required for this workload. Reserved for node-level
  # sysctl tuning (e.g. net.core.somaxconn) if connection backlog becomes a
  # bottleneck under high WebSocket concurrency.
  # userData: |
  #   #!/bin/bash
  #   sysctl -w net.core.somaxconn=65535
  #   sysctl -w net.ipv4.tcp_max_syn_backlog=65535
