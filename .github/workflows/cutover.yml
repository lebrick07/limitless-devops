name: Cutover to stable endpoint

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, staging, prod]
        default: dev
      cluster:
        description: 'Cluster slot to promote'
        type: choice
        options: [cl01, cl02, cl03]
        default: cl01

env:
  AWS_REGION: us-east-1
  HOSTED_ZONE_ID: Z00700503JFGXII6MMCA9

jobs:
  cutover:
    name: Promote ${{ inputs.environment }}/${{ inputs.cluster }} to stable CNAME
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set cluster vars
        run: |
          CLUSTER_NAME="${{ inputs.environment }}-app-api-${{ inputs.cluster }}"
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV

          # Map environment to its stable CNAME
          case "${{ inputs.environment }}" in
            dev)     STABLE_HOST="phoenix-dev.autometalabs.io" ;;
            staging) STABLE_HOST="phoenix-staging.autometalabs.io" ;;
            prod)    STABLE_HOST="phoenix.autometalabs.io" ;;
          esac
          echo "STABLE_HOST=$STABLE_HOST" >> $GITHUB_ENV

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Get ELB hostname
        run: |
          ELB_HOSTNAME=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$ELB_HOSTNAME" ]; then
            echo "ERROR: Could not retrieve ELB hostname. Is nginx-ingress deployed on ${{ env.CLUSTER_NAME }}?"
            exit 1
          fi
          echo "ELB_HOSTNAME=$ELB_HOSTNAME" >> $GITHUB_ENV

      - name: Update stable CNAME
        run: |
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${{ env.STABLE_HOST }}\",
                  \"Type\": \"CNAME\",
                  \"TTL\": 60,
                  \"ResourceRecords\": [{\"Value\": \"${{ env.ELB_HOSTNAME }}\"}]
                }
              }]
            }"
          echo "Cutover complete:"
          echo "  ${{ env.STABLE_HOST }} → ${{ env.ELB_HOSTNAME }}"
          echo "  (cluster: ${{ env.CLUSTER_NAME }})"
