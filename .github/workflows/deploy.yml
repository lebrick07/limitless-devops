name: Deploy EKS + Phoenix

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, staging, prod]
        default: dev
      cluster:
        description: 'Cluster slot (blue/green)'
        type: choice
        options: [cl01, cl02, cl03]
        default: cl01
      skip_build:
        description: 'Skip Docker build+push (use existing ECR image)'
        type: boolean
        default: true
      plan_only:
        description: 'Run terraform plan only (no apply, no deploy)'
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: 216026633254
  ECR_IMAGE: public.ecr.aws/m8k1g5q8/phoenix-liveview-demo:v1.0.0
  HOSTED_ZONE_ID: Z00700503JFGXII6MMCA9

jobs:
  terraform:
    name: Provision EKS cluster
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eks_deploy
        uses: actions/checkout@v4
        with:
          repository: Autometa-Labs/eks_deploy
          path: eks_deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write backend config
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: |
          cat > backend.tf << EOF
          terraform {
            backend "s3" {
              bucket = "collectalot-tf-state"
              key    = "environments/${{ inputs.environment }}/${{ inputs.cluster }}/infra/terraform.tfstate"
              region = "us-east-1"
            }
          }
          EOF

      - name: Terraform init
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: terraform init

      - name: Write tfvars
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: |
          ENV="${{ inputs.environment }}"
          CLUSTER="${{ inputs.cluster }}"
          cat > terraform.tfvars << EOF
          vpc_name       = "${ENV}-app-vpc"
          region         = ["${{ env.AWS_REGION }}"]
          subnets        = ["${ENV}-app-public-subnet-01", "${ENV}-app-public-subnet-02"]
          prefix         = "${ENV}-app-"
          cluster_prefix = "${CLUSTER}"
          eks_version    = "1.30"

          worker_node_policy                   = "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
          cni_policy                           = "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
          container_registry_read_only_policy  = "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
          cluster_policy                       = "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
          resource_controller_policy           = "arn:aws:iam::aws:policy/AmazonEKSVPCResourceController"

          nodegroups = [
            {
              desired_size  = "2"
              max_size      = "4"
              min_size      = "1"
              instance_type = "t3.medium"
              ng_prefix     = "worker"
              volume_size   = "20"
            }
          ]
          EOF

      - name: Terraform plan
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: terraform plan

      - name: Terraform apply
        if: ${{ inputs.plan_only != true }}
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: terraform apply -auto-approve

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    if: ${{ inputs.plan_only != true && inputs.skip_build != true }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws

      - name: Build image
        run: docker build -t ${{ env.ECR_IMAGE }} .

      - name: Push image
        run: docker push ${{ env.ECR_IMAGE }}

  deploy-apps:
    name: Deploy apps to EKS
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]
    if: ${{ always() && inputs.plan_only != true && needs.terraform.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set cluster vars
        run: |
          echo "CLUSTER_NAME=${{ inputs.environment }}-app-api-${{ inputs.cluster }}" >> $GITHUB_ENV
          echo "CLUSTER_HOST=phoenix-${{ inputs.environment }}-${{ inputs.cluster }}.autometalabs.io" >> $GITHUB_ENV

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install nginx ingress (with ACM TLS)
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace \
            -f helm/nginx-ingress/values-eks.yaml \
            --wait

      - name: Install Karpenter controller
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            helm registry login --username AWS --password-stdin public.ecr.aws
          helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
            --version "1.3.3" \
            --namespace karpenter --create-namespace \
            -f helm/karpenter/values-controller.yaml \
            --set settings.clusterName=${{ env.CLUSTER_NAME }} \
            --set settings.interruptionQueue=KarpenterInterruptionQueue-${{ env.CLUSTER_NAME }} \
            --set 'serviceAccount.annotations.eks\.amazonaws\.com/role-arn=arn:aws:iam::${{ env.ACCOUNT_ID }}:role/KarpenterControllerRole-${{ env.CLUSTER_NAME }}' \
            --wait

      - name: Deploy Karpenter NodePool + EC2NodeClass
        run: |
          helm upgrade --install karpenter-config ./helm/karpenter \
            --namespace karpenter

      - name: Deploy Phoenix
        run: |
          helm upgrade --install phoenix-demo ./helm/phoenix \
            -f helm/phoenix/values-eks.yaml \
            --set env.PHX_HOST=${{ env.CLUSTER_HOST }} \
            --set ingress.hosts[0].host=${{ env.CLUSTER_HOST }} \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set secretEnv.SECRET_KEY_BASE="$(openssl rand -hex 64)"

      - name: Update Route53 CNAME for cluster slot
        run: |
          ELB_HOSTNAME=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${{ env.CLUSTER_HOST }}\",
                  \"Type\": \"CNAME\",
                  \"TTL\": 60,
                  \"ResourceRecords\": [{\"Value\": \"$ELB_HOSTNAME\"}]
                }
              }]
            }"
          echo "Cluster live at https://${{ env.CLUSTER_HOST }}"

      - name: Wait for rollout
        run: kubectl rollout status deployment/phoenix-demo-phoenix-liveview-demo --timeout=5m
