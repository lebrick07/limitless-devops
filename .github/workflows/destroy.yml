name: Destroy EKS cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, staging, prod]
        default: dev
      cluster:
        description: 'Cluster slot (blue/green)'
        type: choice
        options: [cl01, cl02, cl03]
        default: cl01
      plan_only:
        description: 'Run terraform plan only (no destroy)'
        type: boolean
        default: false
      confirm:
        description: 'Type DESTROY to confirm teardown'
        type: string
        required: true

env:
  AWS_REGION: us-east-1

jobs:
  destroy:
    name: Tear down cluster
    runs-on: ubuntu-latest
    steps:
      - name: Confirm destruction
        if: ${{ inputs.plan_only != true && inputs.confirm != 'DESTROY' }}
        run: |
          echo "Confirmation input was '${{ inputs.confirm }}' — must be exactly 'DESTROY'. Aborting."
          exit 1

      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout eks_deploy
        uses: actions/checkout@v4
        with:
          repository: Autometa-Labs/eks_deploy
          path: eks_deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set cluster vars
        run: |
          echo "CLUSTER_NAME=${{ inputs.environment }}-app-api-${{ inputs.cluster }}" >> $GITHUB_ENV

      - name: Configure kubectl
        if: ${{ inputs.plan_only != true }}
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Uninstall nginx ingress (triggers ELB deletion)
        if: ${{ inputs.plan_only != true }}
        run: helm uninstall ingress-nginx -n ingress-nginx || true

      - name: Wait for ELB to be deleted
        if: ${{ inputs.plan_only != true }}
        run: |
          echo "Waiting for ELB to be removed by AWS..."
          for i in $(seq 1 30); do
            if ! kubectl get svc -n ingress-nginx ingress-nginx-controller &>/dev/null; then
              echo "ELB service gone."
              break
            fi
            echo "Still waiting... ($i/30)"
            sleep 10
          done

      - name: Uninstall Phoenix
        if: ${{ inputs.plan_only != true }}
        run: helm uninstall phoenix-demo || true

      - name: Uninstall Karpenter NodePool + EC2NodeClass
        if: ${{ inputs.plan_only != true }}
        run: helm uninstall karpenter-config -n karpenter || true

      - name: Uninstall Karpenter controller
        if: ${{ inputs.plan_only != true }}
        run: helm uninstall karpenter -n karpenter || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: terraform init

      - name: Write tfvars
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: |
          ENV="${{ inputs.environment }}"
          CLUSTER="${{ inputs.cluster }}"
          cat > terraform.tfvars << EOF
          vpc_name       = "${ENV}-app-vpc"
          region         = ["${{ env.AWS_REGION }}"]
          subnets        = ["${ENV}-app-public-subnet-01", "${ENV}-app-public-subnet-02"]
          prefix         = "${ENV}-app-"
          cluster_prefix = "${CLUSTER}"
          eks_version    = "1.30"

          worker_node_policy                   = "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
          cni_policy                           = "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
          container_registry_read_only_policy  = "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
          cluster_policy                       = "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
          resource_controller_policy           = "arn:aws:iam::aws:policy/AmazonEKSVPCResourceController"

          nodegroups = [
            {
              desired_size  = "2"
              max_size      = "4"
              min_size      = "1"
              instance_type = "t3.medium"
              ng_prefix     = "worker"
              volume_size   = "20"
            }
          ]
          EOF

      - name: Terraform plan (destroy)
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: terraform plan -destroy

      - name: Terraform destroy
        if: ${{ inputs.plan_only != true }}
        working-directory: eks_deploy/infra_deploy/${{ inputs.environment }}
        run: terraform destroy -auto-approve
